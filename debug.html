<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLC Collections - iPhone Debug</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1a2e;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  padding:20px;
}
.phone-frame{
  width:393px;
  height:852px;
  background:#000;
  border-radius:50px;
  padding:12px;
  box-shadow:
    0 0 0 3px #2a2a3e,
    0 0 0 6px #111,
    0 30px 80px rgba(0,0,0,.6),
    inset 0 0 4px rgba(255,255,255,.05);
  position:relative;
  overflow:hidden;
}
.phone-screen{
  width:100%;
  height:100%;
  border-radius:40px;
  overflow:hidden;
  position:relative;
  background:#000;
}
.notch{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:120px;
  height:34px;
  background:#000;
  border-radius:0 0 20px 20px;
  z-index:10;
}
.notch::after{
  content:'';
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  width:10px;
  height:10px;
  background:#1a1a2e;
  border-radius:50%;
}
iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:40px;
}
.controls{
  position:fixed;
  top:20px;
  left:20px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:100;
}
.controls button{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  color:#ccc;
  padding:8px 16px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  font-family:inherit;
  transition:all .2s;
}
.controls button:hover{
  background:rgba(255,255,255,.2);
  color:#fff;
}
.label{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,.3);
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
}
</style>
</head>
<body>
<div class="controls">
  <button onclick="reload()">↻ Reload</button>
  <button onclick="hardReload()">⚡ Hard Reload</button>
  <button onclick="toggleSize()">📱 Toggle Size</button>
</div>

<div class="phone-frame" id="frame">
  <div class="phone-screen">
    <div class="notch"></div>
    <iframe id="sim" src="index.html?v=48&t=debug"></iframe>
  </div>
</div>

<div class="label">iPhone 15 Pro — Debug View</div>

<script>
var sizes=[
  {w:393,h:852,name:'iPhone 15 Pro'},
  {w:430,h:932,name:'iPhone 15 Pro Max'},
  {w:375,h:812,name:'iPhone 13 mini'},
];
var si=0;

function reload(){
  document.getElementById('sim').src='index.html?v=48&t='+Date.now();
}
function hardReload(){
  document.getElementById('sim').src='index.html?v=48&t='+Date.now()+'&hard=1';
}
function toggleSize(){
  si=(si+1)%sizes.length;
  var s=sizes[si];
  var f=document.getElementById('frame');
  f.style.width=s.w+'px';
  f.style.height=s.h+'px';
  document.querySelector('.label').textContent=s.name+' — Debug View';
}
</script>
</body>
</html>
