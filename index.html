.grn{color:#4ade80}.blu{color:#38bdf8}.red{color:#f87171}.ylw{color:#fbbf24}.gry{color:#475569}.wht{color:#e2e8f0}
.con{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.con a{color:#38bdf8;text-decoration:none;background:rgba(56,189,248,.06);padding:7px 12px;border-radius:6px;font-size:12px}
.badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;margin-right:4px}
.sel{width:100%;background:#0a0f18;border:1px solid rgba(100,116,139,.3);color:#64748b;padding:10px;font-size:13px;border-radius:6px;font-weight:600}
.btn{background:#0a0f18;border:1px solid rgba(30,58,95,.3);color:#7dd3fc;padding:10px 18px;font-size:13px;border-radius:6px;font-weight:700}
.btn-pif{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);color:#4ade80;padding:12px 14px;font-size:12px;border-radius:6px;font-weight:700;white-space:nowrap}
.inp{width:100%;background:#0c1117;border:1px solid rgba(30,58,95,.3);color:#cbd5e1;padding:12px;font-size:14px;border-radius:6px;font-family:inherit}
.inp-g{color:#4ade80;font-weight:700;font-size:16px;border-color:rgba(74,222,128,.2)}
.inp-b{color:#38bdf8;font-weight:700;font-size:16px;border-color:rgba(56,189,248,.2)}
.inp-y{color:#fbbf24;font-weight:700;font-size:16px;border-color:rgba(251,191,36,.2)}
.lbl{font-size:10px;letter-spacing:1px;display:block;margin-bottom:4px;font-weight:600}
.exp-panel{padding:12px;background:#080d13;border-top:1px solid rgba(30,58,95,.15)}
.sep{height:1px;background:rgba(30,58,95,.15);margin:6px 10px}
.sort{font-size:12px;white-space:nowrap;font-weight:400;color:#475569}
.sort.on{color:#7dd3fc;font-weight:700}
.closer-card{background:#0c1117;border:1px solid rgba(30,58,95,.15);border-radius:8px;padding:10px}
.closer-card.on{background:#0f1a2a;border:2px solid rgba(125,211,252,.25)}
.gauge{position:relative;flex-shrink:0}
.pre{flex:1;background:#0f1a2a;border:1px solid rgba(30,58,95,.3);color:#94a3b8;padding:10px 0;font-size:13px;border-radius:6px;font-weight:600;text-align:center}
.inline{padding:4px 12px 8px;font-size:11px;display:flex;gap:8px;flex-wrap:wrap}
</style>

var DF=(function(){var d=new Date();d.setDate(d.getDate()-28);return d.toISOString().split('T')[0]})();
var DT=new Date().toISOString().split('T')[0];

var TD={};
var SK='tlc-v8';

function fd(n){return '$'+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0})}
function fp(n){return Math.round(n*100)+'%'}
function gd(id,f){return(TD[id]||{})[f]||''}
function gdn(id,f){return parseFloat((TD[id]||{})[f])||0}
function upd(id,f,v){if(!TD[id])TD[id]={};TD[id][f]=v;try{localStorage.setItem(SK,JSON.stringify(TD))}catch(e){}render()}
function pif(id,bal){upd(id,'since',String(bal));upd(id,'cs','collected')}

function dueDate(sd){var d=new Date(sd+'T12:00:00');var c=0;while(c<3){d.setDate(d.getDate()+1);if(d.getDay()===5)c++;}return d}
function daysLeft(sd){return Math.ceil((dueDate(sd)-new Date())/(864e5))}

function svg(w,h,ws,si,ex,txt){
  var r=w*.4,lw=w*.13,cx=w/2,cy=h-2;
  function arc(s,e,col){
    var sa=Math.PI+s*Math.PI,ea=Math.PI+e*Math.PI,pts=[];
    for(var i=0;i<=30;i++){var a=sa+i*(ea-sa)/30;pts.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1))}
    return '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+col+'" stroke-width="'+lw+'" stroke-linecap="round"/>'
  }
  var s='<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">';
  s+=arc(0,1,'#1e293b');
  if(ws>0)s+=arc(0,Math.min(ws,1),'#4ade80');
  if(si>0)s+=arc(ws,Math.min(ws+si,1),'#38bdf8');
  if(ex>0)s+=arc(ws+si,Math.min(ws+si+ex,1),'rgba(251,191,36,.3)');
  if(txt)s+='<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" fill="#e2e8f0" font-size="'+(w*.22)+'" font-weight="700" font-family="system-ui">'+txt+'</text>';
  return s+'</svg>'
}


var NK='tlc-notif';var NC={};
try{var nv=localStorage.getItem(NK);if(nv)NC=JSON.parse(nv)}catch(e){}
function saveN(){try{localStorage.setItem(NK,JSON.stringify(NC))}catch(e){}}
function togN(k){if(!NC[k])NC[k]={on:true,days:[1,3,7]};else NC[k].on=!NC[k].on;saveN();render()}
function togD(k,d){if(!NC[k])NC[k]={on:true,days:[]};var i=NC[k].days.indexOf(d);if(i>=0)NC[k].days.splice(i,1);else NC[k].days.push(d);saveN();render()}
function reqPerm(){if('Notification' in window)Notification.requestPermission().then(function(){render()})}
function jumpTo(id){S.jump=id;S.exp=id;S.settings=false;S.f='ALL';render();
setTimeout(fireNotifs,2000);setTimeout(function(){var el=document.getElementById('c-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},150)}
function fireNotifs(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  D.filter(function(c){return c.bal>0}).forEach(function(cl){
    var cfg=NC[cl.cl]||NC['ALL'];if(!cfg||!cfg.on)return;
    var dl=daysLeft(cl.ed);if(cfg.days.indexOf(dl)<0)return;
    var rem=cl.bal-gdn(cl.id,'since');if(rem<=0)return;
    var n=new Notification('TLC: '+cl.nm+' - '+fd(rem),{body:cl.ev+' | '+cl.cl+' | Due in '+dl+'d',tag:cl.id});
    n.onclick=function(){window.focus();jumpTo(cl.id)};
  });
}

function render(){
  var f=S.f,items=D.filter(function(c){return c.bal>0&&c.ed>=DF&&c.ed<=DT});
  if(f!=='ALL')items=items.filter(function(c){return c.cl===f});
  var col=S.sb,dir=S.sd;
  items.sort(function(a,b){
    var av=col==='since'?gdn(a.id,'since'):a[col],bv=col==='since'?gdn(b.id,'since'):b[col];
    if(typeof av==='string')return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return dir==='asc'?av-bv:bv-av
  });

  var all=D.filter(function(c){return c.bal>0&&c.ed>=DF&&c.ed<=DT});
  var tSale=0,tWS=0,tBal=0,tSince=0,tExp=0;
  all.forEach(function(c){tSale+=c.sale;tWS+=c.col;tBal+=c.bal;tSince+=gdn(c.id,'since');tExp+=gdn(c.id,'exp')});
  var pp=tSale>0?(tWS+tSince)/tSale:0;

  // Closer summaries
  var cls={};
  all.forEach(function(c){
    if(!cls[c.cl])cls[c.cl]={bal:0,cnt:0,sale:0,ws:0,si:0,ex:0,con:0};
    cls[c.cl].bal+=c.bal;cls[c.cl].cnt++;cls[c.cl].sale+=c.sale;cls[c.cl].ws+=c.col;
    cls[c.cl].si+=gdn(c.id,'since');cls[c.cl].ex+=gdn(c.id,'exp');
    if(gd(c.id,'cs')&&gd(c.id,'cs')!=='not_contacted')cls[c.cl].con++;
  });
  var clKeys=Object.keys(cls).sort(function(a,b){return cls[b].bal-cls[a].bal});

  var h='<div class="hdr">';
  // Title + reset
  h+='<div class="fx jb ac" style="margin-bottom:8px"><div class="tag">TLC COLLECTIONS</div>';
  h+='<div class="fx g6">';
  h+='<button style="background:transparent;border:1px solid rgba(30,58,95,.3);color:#7dd3fc;padding:6px 10px;font-size:16px;border-radius:6px" onclick="S.settings=!S.settings;render()">\u2699</button>';
  if(S.reset){h+='<div class="fx g6"><button class="btn" style="background:#f87171;color:#fff;border:none" onclick="TD={};try{localStorage.removeItem(SK)}catch(e){}S.reset=false;render()">Clear All</button><button class="btn" onclick="S.reset=false;render()">Cancel</button></div>'}
  else{h+='<button style="background:transparent;border:1px solid rgba(248,113,113,.2);color:#f87171;padding:6px 12px;font-size:11px;border-radius:6px" onclick="S.reset=true;render()">Reset</button>'}
  h+='</div>';
  h+='</div>';

  // Main gauge + stats
  h+='<div class="fx ac g12" style="margin-bottom:10px">';
  h+='<div class="gauge" style="width:96px;height:56px">'+svg(96,56,tSale>0?tWS/tSale:0,tSale>0?tSince/tSale:0,tSale>0?tExp/tSale:0,fp(pp))+'</div>';
  h+='<div class="fc" style="flex:1"><div style="font-size:22px;font-weight:700;color:#fb923c">'+fd(tBal-tSince)+'</div>';
  h+='<div style="font-size:11px;color:#64748b">'+items.length+' accts outstanding</div>';
  h+='<div class="fx g8" style="font-size:10px;margin-top:2px"><span class="grn">WS: '+fd(tWS)+'</span>';
  if(tSince>0)h+='<span class="blu">+'+fd(tSince)+'</span>';
  if(tExp>0)h+='<span class="ylw">Exp: '+fd(tExp)+'</span>';
  h+='</div></div>';
  h+='<div class="fc" style="align-items:flex-end"><div style="font-size:28px;font-weight:700;color:#fff">'+items.length+'</div><div style="font-size:8px;font-weight:700;color:#475569;letter-spacing:2px">OPEN</div></div>';
  h+='</div>';

  // Legend
  h+='<div class="fx g12" style="font-size:9px;color:#475569;margin-bottom:10px">';
  h+='<span><span style="display:inline-block;width:8px;height:8px;background:#4ade80;border-radius:2px;margin-right:4px"></span>Workshop</span>';
  h+='<span><span style="display:inline-block;width:8px;height:8px;background:#38bdf8;border-radius:2px;margin-right:4px"></span>Since</span>';
  h+='<span><span style="display:inline-block;width:8px;height:8px;background:rgba(251,191,36,.3);border-radius:2px;margin-right:4px"></span>Expected</span>';
  h+='</div>';

  // Date presets
  h+='<div class="fx g6" style="margin-bottom:8px">';
  ['4W','6W','8W','3M','ALL'].forEach(function(l,i){
    var w=[4,6,8,13,52][i];
    h+='<button class="pre" onclick="setPre('+w+')">'+l+'</button>';
  });
  h+='<button class="pre" style="width:44px;flex:none;color:#7dd3fc;font-size:18px'+(S.dates?';background:#1e3a5f':'')+'" onclick="S.dates=!S.dates;render()">\u{1F4C5}</button>';
  h+='</div>';

  // Date inputs (collapsible)
  var dfmt=function(d){var p=d.split('-');return p[1]+'/'+p[2]};
  var daySpan=Math.round((new Date(DT)-new Date(DF))/(864e5));
  h+='<div style="font-size:10px;color:#475569;margin-bottom:6px;padding:0 2px">'+dfmt(DF)+' - '+dfmt(DT)+' ('+daySpan+' days)</div>';
  if(S.dates){
    h+='<div class="fx g8" style="margin-bottom:8px">';
    h+='<input type="date" class="inp" style="flex:1;padding:10px;font-size:14px" value="'+DF+'" onchange="DF=this.value;render()">';
    h+='<input type="date" class="inp" style="flex:1;padding:10px;font-size:14px" value="'+DT+'" onchange="DT=this.value;render()">';
    h+='</div>';
  }

  // Closer pills
  h+='<div class="pills" style="margin-bottom:8px">';
  h+='<div class="pill all'+(f==='ALL'?' on':'')+'" onclick="S.f=\'ALL\';render()">ALL</div>';
  clKeys.forEach(function(k){h+='<div class="pill'+(f===k?' on':'')+'" onclick="S.f=\''+k+'\';render()">'+k+'</div>'});
  h+='</div></div>';


  if(S.settings){
    h+='<div style="padding:14px;margin:0 10px 10px;background:#0c1117;border:1px solid rgba(30,58,95,.15);border-radius:8px">';
    h+='<div class="fx jb ac" style="margin-bottom:12px"><div style="font-size:14px;font-weight:700;color:#e2e8f0">\\u{1F514} Notification Settings</div>';
    h+='<button style="background:transparent;border:1px solid rgba(30,58,95,.3);color:#475569;padding:6px 12px;font-size:11px;border-radius:6px" onclick="S.settings=false;render()">Close</button></div>';
    var perm="Notification" in window?Notification.permission:"none";
    if(perm==="none"||perm==="default"){
      h+='<button style="width:100%;background:#4ade80;border:none;color:#080d13;padding:14px;font-size:14px;font-weight:700;border-radius:8px;margin-bottom:12px" onclick="reqPerm()">Enable Notifications</button>';
    } else if(perm==="denied"){
      h+='<div style="padding:12px;background:rgba(248,113,113,.1);border-radius:6px;margin-bottom:12px;font-size:12px;color:#f87171">Blocked. Go to Settings to enable.</div>';
    } else {
      h+='<div style="padding:8px 12px;background:rgba(74,222,128,.1);border-radius:6px;margin-bottom:12px;font-size:12px;color:#4ade80">\\u2705 Notifications enabled</div>';
    }
    h+='<div style="font-size:10px;color:#64748b;letter-spacing:1px;margin-bottom:8px;font-weight:600">NOTIFY FOR CLOSERS</div>';
    var nKeys=["ALL"].concat(Object.keys(CN));
    nKeys.forEach(function(k){
      if(k!=="ALL"&&!cls[k])return;
      var cfg=NC[k]||{on:false,days:[]};
      var label=k==="ALL"?"ALL CLOSERS":k+" - "+CN[k];
      var col=k==="ALL"?"#4ade80":"#7dd3fc";
      h+='<div class="fx jb ac" style="padding:10px 0;border-bottom:1px solid rgba(30,58,95,.1)">';
      h+='<span style="font-size:13px;font-weight:700;color:'+col+'">'+label+'</span>';
      h+='<button style="width:48px;height:26px;border-radius:13px;border:none;background:'+(cfg.on?"#4ade80":"#1e293b")+';position:relative" onclick="togN(\''+k+'\')">';
      h+='<div style="width:20px;height:20px;border-radius:10px;background:#fff;position:absolute;top:3px;'+(cfg.on?"right:3px":"left:3px")+'"></div></button></div>';
      if(cfg.on){
        h+='<div class="fx g6" style="padding:8px 0 4px">';
        h+='<span style="font-size:10px;color:#64748b;margin-right:4px">Alert at:</span>';
        [1,3,5,7,14].forEach(function(d){
          var isOn=cfg.days&&cfg.days.indexOf(d)>=0;
          h+='<button style="padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid '+(isOn?"#7dd3fc":"rgba(30,58,95,.3)")+";background:"+(isOn?"rgba(125,211,252,.15)":"transparent")+";color:"+(isOn?"#7dd3fc":"#475569")+'" onclick="togD(\''+k+'\','+d+')">'+d+'d</button>';
        });
        h+='</div>';
      }
    });
    h+='<button style="width:100%;margin-top:14px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);color:#38bdf8;padding:12px;font-size:13px;font-weight:700;border-radius:8px" onclick="fireNotifs()">Test Notifications Now</button>';
    h+='</div>';
  }

  // Closer cards
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 10px 6px">';
  clKeys.forEach(function(k){
    var c=cls[k],pc=c.cnt>0?c.con/c.cnt:0;
    var wp=c.sale>0?c.ws/c.sale:0,sp=c.sale>0?c.si/c.sale:0,ep=c.sale>0?c.ex/c.sale:0;
    var paid=c.sale>0?(c.ws+c.si)/c.sale:0;
    h+='<div class="closer-card'+(f===k?' on':'')+'" onclick="S.f=S.f===\''+k+'\'?\'ALL\':\''+k+'\';render()">';
    h+='<div class="fx ac g8">';
    h+='<div style="width:60px;height:36px;flex-shrink:0">'+svg(60,36,wp,sp,ep,fp(paid))+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div class="fx jb"><span style="color:#7dd3fc;font-weight:700;font-size:15px">'+k+'</span><span style="color:#fb923c;font-weight:700;font-size:13px">'+fd(c.bal)+'</span></div>';
    h+='<div style="color:#64748b;font-size:10px;margin-top:1px">'+CN[k]+'</div>';
    h+='<div style="color:#475569;font-size:10px;margin-top:2px">'+c.con+'/'+c.cnt+' contacted</div>';
    h+='</div></div></div>'
  });
  h+='</div>';

  // Sort bar
  h+='<div class="fx g10" style="padding:6px 14px;overflow-x:auto">';
  [['bal','Balance'],['nm','Name'],['ev','Event'],['cl','Closer']].forEach(function(p){
    var on=S.sb===p[0];
    h+='<span class="sort'+(on?' on':'')+'" onclick="if(S.sb===\''+p[0]+'\')S.sd=S.sd===\'asc\'?\'desc\':\'asc\';else{S.sb=\''+p[0]+'\';S.sd=\'desc\'};render()">'+p[1]+(on?(S.sd==='asc'?' ^':' v'):'')+'</span>'
  });
  h+='</div>';

  // Client cards
  items.forEach(function(c){
    var dl=daysLeft(c.ed),dlTxt=dl>0?dl+'d':dl===0?'TODAY':'PAST';
    var dlCol=dl<=0?'#f87171':dl<=7?'#fbbf24':'#4ade80';
    var urg=dl<=0?'URGENT':dl<=7?'DUE':'ACTIVE';
    var urgBg=dl<=0?'rgba(248,113,113,.1)':dl<=7?'rgba(251,191,36,.1)':'rgba(74,222,128,.1)';
    var cpd=c.sale>0?c.col/c.sale:0;
    var rrCol=c.rr==='DECLINED'?'red':c.rr==='RANGE'?'blu':c.rr==='APPROVED'?'grn':'ylw';
    var cs=gd(c.id,'cs')||'not_contacted';
    var since=gdn(c.id,'since');
    var exp=gdn(c.id,'exp');
    var edt=gd(c.id,'edt');
    var cn=gd(c.id,'cn');
    var isX=S.exp===c.id;
    var wp=c.sale>0?c.col/c.sale:0,sp=c.sale>0?since/c.sale:0,ep=c.sale>0?exp/c.sale:0;
    var remaining=c.bal-since;

    h+='<div class="card" id="c-'+c.id+'">';
    // Top: gauge + info + balance
    var isJ=S.jump===c.id;h+='<div class="card-body fx g10" style="align-items:flex-start'+(isJ?';box-shadow:inset 0 0 0 2px #7dd3fc':'')+'">'; if(isJ)setTimeout(function(){S.jump=null;render()},2500);
    h+='<div style="width:80px;height:46px;flex-shrink:0">'+svg(80,46,wp,sp,ep,fp((c.col+since)/(c.sale||1)))+'</div>';
    h+='<div style="flex:1;min-width:0">';
    h+='<div class="fx ac g6 fw" style="margin-bottom:4px">';
    var dueD=dueDate(c.ed);var dueFmt=(dueD.getMonth()+1)+'/'+dueD.getDate();
    h+='<span class="badge" style="color:'+dlCol+';background:'+urgBg+'">'+dlTxt+' ('+dueFmt+')</span>';
    h+='<span class="badge" style="color:'+(TC[c.t]||'#94a3b8')+';background:'+(TC[c.t]||'#94a3b8')+'15">'+(TS[c.t]||'')+'</span>';
    h+='<span style="color:#7dd3fc;font-size:11px;font-weight:700">'+c.cl+'</span>';
    h+='</div>';
    h+='<div class="nm">'+c.nm+'</div>';
    h+='<div class="ev">'+c.ev+'</div>';
    h+='</div>';
    h+='<div style="text-align:right;flex-shrink:0"><div class="bal">'+fd(remaining>0?remaining:c.bal)+'</div>';
    h+='<div class="bsub">of '+fd(c.sale)+'</div>';
    if(since>0)h+='<div style="color:#38bdf8;font-size:10px;font-weight:600">+'+fd(since)+' since</div>';
    h+='</div></div>';

    // Stats
    h+='<div style="padding:0 12px 8px"><div class="stat">';
    h+='<span class="grn">WS: '+fd(c.col)+'</span>';
    if(c.rr)h+='<span class="'+rrCol+'">RR: '+c.rn+'</span>';
    if(c.nt)h+='<span class="gry">'+c.nt+'</span>';
    h+='</div></div>';

    // Contact
    if(c.ph||c.em){
      h+='<div style="padding:0 12px 8px"><div class="con">';
      if(c.ph)h+='<a href="tel:'+c.ph+'">Ph '+c.ph+'</a>';
      if(c.em)h+='<a href="mailto:'+c.em+'" style="overflow:hidden;text-overflow:ellipsis;max-width:220px;white-space:nowrap">Em '+c.em+'</a>';
      h+='</div></div>'
    }

    // Status + expand
    h+='<div class="fx g8" style="padding:6px 12px 8px;border-top:1px solid rgba(30,58,95,.1)">';
    h+='<select class="sel" style="color:'+SC[cs]+'" onchange="upd(\''+c.id+'\',\'cs\',this.value)">';
    Object.keys(SN).forEach(function(k){h+='<option value="'+k+'"'+(cs===k?' selected':'')+'>'+SN[k]+'</option>'});
    h+='</select>';
    h+='<button class="btn" onclick="S.exp=S.exp===\''+c.id+'\'?null:\''+c.id+'\';render()">'+(isX?'\u25B2':'\u25BC')+'</button>';
    h+='</div>';

    // Expanded panel
    if(isX){
      h+='<div class="exp-panel">';
      h+='<div style="margin-bottom:12px"><label class="lbl blu">COLLECTED SINCE WORKSHOP</label>';
      h+='<div class="fx g8 ac"><input type="number" class="inp inp-b" style="max-width:160px" value="'+(since||'')+'" placeholder="0" onchange="upd(\''+c.id+'\',\'since\',this.value)">';
      h+='<button class="btn-pif" onclick="pif(\''+c.id+'\','+c.bal+')">PIF</button></div></div>';
      h+='<div style="margin-bottom:12px"><label class="lbl ylw">EXPECTED NEXT PAYMENT</label>';
      h+='<div class="fx g8 ac"><input type="number" class="inp inp-y" style="width:140px" value="'+(exp||'')+'" placeholder="0" onchange="upd(\''+c.id+'\',\'exp\',this.value)">';
      var pifAmt=c.sale-c.col-since;
      h+='<button class="btn-pif" style="background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.25);color:#fbbf24" onclick="upd(\''+c.id+'\',\'exp\',\''+Math.max(0,pifAmt)+'\')">';
      h+='PIF '+fd(Math.max(0,pifAmt))+'</button></div>';
      h+='<div style="margin-top:8px"><input type="date" class="inp" value="'+edt+'" onchange="upd(\''+c.id+'\',\'edt\',this.value)"></div></div>';
      h+='<div><label class="lbl gry">NOTES</label>';
      h+='<input class="inp" value="'+cn.replace(/"/g,'&quot;')+'" placeholder="Follow-up notes..." onchange="upd(\''+c.id+'\',\'cn\',this.value)"></div>';
      h+='</div>'
    }

    // Inline summary when collapsed
    if(!isX&&(cn||since>0||exp>0)){
      h+='<div class="inline">';
      if(since>0)h+='<span class="blu">+'+fd(since)+' since</span>';
      if(exp>0)h+='<span class="ylw">Exp: '+fd(exp)+'</span>';
      if(edt)h+='<span class="gry">by '+edt+'</span>';
      if(cn)h+='<span class="gry">"'+cn+'"</span>';
      h+='</div>'
    }
    h+='</div>'
  });

  // Footer
  h+='<div class="fx jb ac" style="padding:14px 16px;font-size:8px;color:#334155">';
  h+='<span>LH // '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</span>';
  h+='<span style="color:#7dd3fc;font-weight:700">TLC COLLECTIONS</span></div>';

  document.getElementById('app').innerHTML=h
}

try{var v=localStorage.getItem(SK);if(v)TD=JSON.parse(v)}catch(e){}
render();
setTimeout(fireNotifs,2000);
</script>
</body>
</html>
