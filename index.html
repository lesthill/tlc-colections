const sC={not_contacted:"#64748b",contacted:"#fbbf24",committed:"#4ade80",unreachable:"#f87171",collected:"#38bdf8"};
const sL={not_contacted:"Not Contacted",contacted:"Contacted",committed:"Committed",unreachable:"Unreachable",collected:"Collected"};

// 3-segment gauge component
const Gauge = ({sale, workshopCol, sinceCol, expected}) => {
  const total = sale;
  if (total === 0) return null;
  const w1 = Math.min(workshopCol / total, 1);
  const w2 = Math.min(sinceCol / total, 1 - w1);
  const w3 = Math.min(expected / total, 1 - w1 - w2);
  const totalPaid = workshopCol + sinceCol;
  const totalPct = totalPaid / total;
  const r = 44;
  const circ = Math.PI * r;
  const a1 = w1 * circ;
  const a2 = w2 * circ;
  const a3 = w3 * circ;
  return (
    <div style={{position:"relative",width:"96px",height:"56px",flexShrink:0}}>
      <svg width="96" height="56" viewBox="0 0 100 56">
        <path d="M 6 52 A 44 44 0 0 1 94 52" fill="none" stroke="#1e293b" strokeWidth="8" strokeLinecap="round"/>
        {a1 > 0 && <path d="M 6 52 A 44 44 0 0 1 94 52" fill="none" stroke="#4ade80" strokeWidth="8" strokeLinecap="round" strokeDasharray={`${a1} ${circ}`}/>}
        {a2 > 0 && <path d="M 6 52 A 44 44 0 0 1 94 52" fill="none" stroke="#38bdf8" strokeWidth="8" strokeLinecap="round" strokeDasharray={`0 ${a1} ${a2} ${circ}`}/>}
        {a3 > 0 && <path d="M 6 52 A 44 44 0 0 1 94 52" fill="none" stroke="#fbbf2450" strokeWidth="8" strokeLinecap="round" strokeDasharray={`0 ${a1+a2} ${a3} ${circ}`}/>}
        <text x="50" y="42" textAnchor="middle" fill="#e2e8f0" fontSize="16" fontWeight="700" fontFamily="'Instrument Serif',serif">{pct(totalPct)}</text>
        <text x="50" y="53" textAnchor="middle" fill="#475569" fontSize="7" fontFamily="monospace">PAID</text>
      </svg>
    </div>
  );
};

  const clSum=useMemo(()=>Object.keys(CN).map(k=>{

    const wsCol=cc.reduce((s,c)=>s+c.col,0);
    const sinceCol=cc.reduce((s,c)=>s+(parseFloat(td[c.id]?.since)||0),0);
    const expCol=cc.reduce((s,c)=>s+(parseFloat(td[c.id]?.exp)||0),0);

                  <label style={{fontSize:"10px",color:"#38bdf8",letterSpacing:"1px",display:"block",marginBottom:"4px",fontWeight:600}}>COLLECTED SINCE WORKSHOP</label>
                  <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                    <input type="number" value={c.since||""} onChange={e=>upd(c.id,"since",e.target.value)} placeholder="0" max={c.bal} style={{flex:1,background:"#0c1117",border:"1px solid #38bdf830",color:"#38bdf8",padding:"12px",fontSize:"16px",fontFamily:"inherit",borderRadius:"6px",fontWeight:700,maxWidth:"160px"}}/>
                    <button onClick={()=>{upd(c.id,"since",String(c.bal));upd(c.id,"cs","collected")}} style={{background:"#4ade8020",border:"1px solid #4ade8040",color:"#4ade80",padding:"12px 14px",fontSize:"12px",borderRadius:"6px",fontFamily:"inherit",fontWeight:700,whiteSpace:"nowrap"}}>✓ PIF</button>
                  </div>
                </div>

                {/* Expected */}
                <div style={{marginBottom:"12px"}}>
                  <label style={{fontSize:"10px",color:"#fbbf24",letterSpacing:"1px",display:"block",marginBottom:"4px",fontWeight:600}}>EXPECTED NEXT PAYMENT</label>
                  <div style={{display:"flex",gap:"8px"}}>
                    <input type="number" value={c.exp||""} onChange={e=>upd(c.id,"exp",e.target.value)} placeholder="0" max={46997} style={{background:"#0c1117",border:"1px solid #fbbf2430",color:"#fbbf24",padding:"12px",fontSize:"16px",fontFamily:"inherit",borderRadius:"6px",fontWeight:700,width:"140px"}}/>
                    <input type="date" value={c.edt} onChange={e=>upd(c.id,"edt",e.target.value)} style={{flex:1,background:"#0c1117",border:"1px solid #1e3a5f30",color:"#cbd5e1",padding:"12px",fontSize:"14px",fontFamily:"inherit",borderRadius:"6px"}}/>
                  </div>
                </div>

                {/* Notes */}
                <div>
                  <label style={{fontSize:"10px",color:"#64748b",letterSpacing:"1px",display:"block",marginBottom:"4px"}}>NOTES</label>
                  <input value={c.cn} onChange={e=>upd(c.id,"cn",e.target.value)} placeholder="Follow-up notes..." style={{width:"100%",background:"#0c1117",border:"1px solid #1e3a5f30",color:"#94a3b8",padding:"12px",fontSize:"14px",fontFamily:"inherit",borderRadius:"6px"}}/>
                </div>
              </div>)}

              {/* Inline summary when collapsed */}
              {!isX&&(c.cn||c.since>0||c.exp>0)&&(<div style={{padding:"4px 12px 8px",fontSize:"11px",display:"flex",gap:"8px",flexWrap:"wrap"}}>
                {c.since>0&&<span style={{color:"#38bdf8"}}>+{fmt(c.since)} since</span>}
                {c.exp>0&&<span style={{color:"#fbbf24"}}>Exp: {fmt(c.exp)}</span>}
                {c.edt&&<span style={{color:"#94a3b8"}}>by {c.edt}</span>}
                {c.cn&&<span style={{color:"#64748b"}}>"{c.cn}"</span>}
              </div>)}
            </div>
          );
        })}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>


</body>
</html>
