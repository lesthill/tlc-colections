*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#080d13;color:#e2e8f0;font-family:-apple-system,system-ui,sans-serif;min-height:100vh;-webkit-overflow-scrolling:touch}
.hdr{background:linear-gradient(180deg,#0a1628,#080d13);padding:16px;border-bottom:1px solid rgba(30,58,95,0.2)}
.tag{font-size:9px;letter-spacing:4px;color:#4ade80;margin-bottom:8px}
.row{display:flex;align-items:center;gap:12px}
.col{display:flex;flex-direction:column}
.big{font-size:24px;font-weight:700;color:#fb923c}
.sub{font-size:12px;color:#64748b;margin-top:2px}
.pills{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-top:10px}
.pill{background:#0f1a2a;border:1px solid rgba(30,58,95,0.3);color:#94a3b8;padding:10px 14px;font-size:13px;border-radius:8px;font-weight:600;white-space:nowrap;flex-shrink:0;cursor:pointer;font-family:inherit}
.pill.on{background:#7dd3fc;color:#080d13;border:none}
.card{background:#0c1117;border:1px solid rgba(30,58,95,0.15);border-radius:8px;padding:14px;margin:6px 10px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.name{font-size:15px;font-weight:600;color:#e2e8f0}
.ev{font-size:11px;color:#475569;margin-top:2px}
.bal{font-size:18px;font-weight:700;color:#fb923c;text-align:right}
.balsub{font-size:10px;color:#475569;text-align:right}
.stat{display:flex;gap:10px;font-size:11px;flex-wrap:wrap;margin-bottom:6px}
.grn{color:#4ade80}.blu{color:#38bdf8}.red{color:#f87171}.ylw{color:#fbbf24}.gry{color:#475569}
.contact{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.contact a{color:#38bdf8;text-decoration:none;background:rgba(56,189,248,0.06);padding:8px 12px;border-radius:6px;font-size:12px}
.badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;display:inline-block;margin-right:6px}
.sel{width:100%;background:#0a0f18;border:1px solid rgba(100,116,139,0.3);color:#64748b;padding:10px;font-size:13px;border-radius:6px;font-weight:600;font-family:inherit;-webkit-appearance:none;margin-top:6px}
.gauge{position:relative;width:80px;height:46px;flex-shrink:0}
.gauge svg{width:80px;height:46px}
.sep{height:1px;background:rgba(30,58,95,0.15);margin:8px 10px}

var TS={9995:"$10K",25997:"$26K",39997:"$40K",46997:"$47K"};
var TC={9995:"#94a3b8",25997:"#38bdf8",39997:"#4ade80",46997:"#fbbf24"};
var state={filter:"ALL",data:{}};

function fd(n){return"$"+Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0})}
function fp(n){return Math.round(n*100)+"%"}
function dueDate(sd){var d=new Date(sd+"T12:00:00");var c=0;while(c<3){d.setDate(d.getDate()+1);if(d.getDay()===5)c++}return d}
function daysLeft(sd){var due=dueDate(sd);var now=new Date();return Math.ceil((due-now)/(1000*60*60*24))}

function svg(w,h,ws,si,ex){
  var r=w*0.4;var lw=w*0.13;var cx=w/2;var cy=h-2;
  var arc=function(s,e,col){
    var sa=Math.PI+s*Math.PI,ea=Math.PI+e*Math.PI;
    var pts=[];for(var i=0;i<=30;i++){var a=sa+i*(ea-sa)/30;pts.push((cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1))}
    return'<polyline points="'+pts.join(" ")+'" fill="none" stroke="'+col+'" stroke-width="'+lw+'" stroke-linecap="round"/>';
  };
  var s='<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">';
  s+=arc(0,1,"#1e293b");
  if(ws>0)s+=arc(0,Math.min(ws,1),"#4ade80");
  if(si>0)s+=arc(ws,Math.min(ws+si,1),"#38bdf8");
  if(ex>0)s+=arc(ws+si,Math.min(ws+si+ex,1),"rgba(251,191,36,0.3)");
  s+='</svg>';return s;
}

function load(){try{var v=localStorage.getItem("tlc-v7");if(v)state.data=JSON.parse(v)}catch(e){}}
function save(){try{localStorage.setItem("tlc-v7",JSON.stringify(state.data))}catch(e){}}
function upd(id,f,v){if(!state.data[id])state.data[id]={};state.data[id][f]=v;save();render()}
function gd(id,f){return(state.data[id]||{})[f]||""}

function render(){
  var f=state.filter;
  var now=new Date();
  var cutoff=new Date();cutoff.setDate(cutoff.getDate()-28);
  var df=cutoff.toISOString().split("T")[0];
  var items=D.filter(function(c){return c.bal>0});
  if(f!=="ALL")items=items.filter(function(c){return c.cl===f});
  items.sort(function(a,b){return b.bal-a.bal});

  var tSale=0,tWS=0,tBal=0;
  items.forEach(function(c){tSale+=c.sale;tWS+=c.col;tBal+=c.bal});
  var pp=tSale>0?tWS/tSale:0;

  var closers={};
  D.filter(function(c){return c.bal>0}).forEach(function(c){
    if(!closers[c.cl])closers[c.cl]={bal:0,cnt:0};
    closers[c.cl].bal+=c.bal;closers[c.cl].cnt++;
  });

  var h='<div class="hdr">';
  h+='<div class="tag">TLC COLLECTIONS</div>';
  h+='<div class="row" style="margin-bottom:12px">';
  h+='<div class="gauge">'+svg(80,46,pp,0,0)+'<div style="position:absolute;top:14px;left:0;width:80px;text-align:center;font-size:18px;font-weight:700;color:#e2e8f0">'+fp(pp)+'</div></div>';
  h+='<div class="col" style="flex:1"><div class="big">'+fd(tBal)+'</div>';
  h+='<div class="sub">'+items.length+' accounts outstanding</div>';
  h+='<div style="display:flex;gap:8px;font-size:11px;margin-top:2px"><span class="grn">WS: '+fd(tWS)+'</span></div>';
  h+='</div>';
  h+='<div class="col" style="align-items:flex-end"><div style="font-size:28px;font-weight:700;color:#fff">'+items.length+'</div><div style="font-size:8px;font-weight:700;color:#475569;letter-spacing:2px">OPEN</div></div>';
  h+='</div>';

  // Closer pills
  h+='<div class="pills">';
  h+='<div class="pill'+(f==="ALL"?" on":"")+'" onclick="state.filter=\'ALL\';render()">ALL</div>';
  Object.keys(CN).forEach(function(k){
    if(!closers[k])return;
    h+='<div class="pill'+(f===k?" on":"")+'" onclick="state.filter=\''+k+'\';render()">'+k+'</div>';
  });
  h+='</div></div>';

  // Cards
  items.forEach(function(c){
    var dl=daysLeft(c.ed);
    var dlTxt=dl>0?dl+"d":dl===0?"TODAY":"PAST";
    var dlCol=dl<=0?"red":dl<=7?"ylw":"grn";
    var cpd=c.sale>0?c.col/c.sale:0;
    var rrCol=c.rr==="DECLINED"?"red":c.rr==="RANGE"?"blu":"ylw";
    var cs=gd(c.id,"cs")||"not_contacted";

    h+='<div class="card">';
    h+='<div class="card-top"><div>';
    h+='<span class="badge" style="color:'+({URGENT:"#f87171",DUE:"#fbbf24",ACTIVE:"#4ade80"}[dl<=0?"URGENT":dl<=7?"DUE":"ACTIVE"])+';background:'+({URGENT:"rgba(248,113,113,0.1)",DUE:"rgba(251,191,36,0.1)",ACTIVE:"rgba(74,222,128,0.1)"}[dl<=0?"URGENT":dl<=7?"DUE":"ACTIVE"])+'">'+dlTxt+'</span>';
    h+='<span class="badge" style="color:'+(TC[c.t]||"#94a3b8")+';background:'+(TC[c.t]||"#94a3b8")+'15">'+(TS[c.t]||"")+'</span>';
    h+='<span style="color:#7dd3fc;font-size:11px;font-weight:700">'+c.cl+'</span>';
    h+='<div class="name">'+c.nm+'</div>';
    h+='<div class="ev">'+c.ev+'</div>';
    h+='</div>';
    h+='<div><div class="bal">'+fd(c.bal)+'</div><div class="balsub">of '+fd(c.sale)+' ('+fp(cpd)+')</div></div>';
    h+='</div>';

    // Stats
    h+='<div class="stat">';
    h+='<span class="grn">WS: '+fd(c.col)+'</span>';
    if(c.rr)h+='<span class="'+rrCol+'">RR: '+c.rn+'</span>';
    if(c.nt)h+='<span class="gry">'+c.nt+'</span>';
    h+='</div>';

    // Contact
    if(c.ph||c.em){
      h+='<div class="contact">';
      if(c.ph)h+='<a href="tel:'+c.ph+'">Ph '+c.ph+'</a>';
      if(c.em)h+='<a href="mailto:'+c.em+'">Em '+c.em+'</a>';
      h+='</div>';
    }

    // Status select
    h+='<select class="sel" style="color:'+({not_contacted:"#64748b",contacted:"#fbbf24",committed:"#4ade80",unreachable:"#f87171",collected:"#38bdf8"}[cs])+'" onchange="upd(\''+c.id+'\',\'cs\',this.value)">';
    ["not_contacted","contacted","committed","unreachable","collected"].forEach(function(s){
      h+='<option value="'+s+'"'+(cs===s?" selected":"")+'>'+({not_contacted:"Not Contacted",contacted:"Contacted",committed:"Committed",unreachable:"Unreachable",collected:"Collected"}[s])+'</option>';
    });
    h+='</select>';
    h+='</div>';
  });

  // Footer
  h+='<div style="padding:12px 16px;display:flex;justify-content:space-between;font-size:8px;color:#334155">';
  h+='<span>LH // '+new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})+'</span>';
  h+='<span style="color:#7dd3fc;font-weight:700">TLC COLLECTIONS</span>';
  h+='</div>';

  document.getElementById("app").innerHTML=h;
}

load();
render();
</script>
