function setNTitle(v){NTITLE=v;try{localStorage.setItem('tlc-ntitle',v)}catch(e){}}

function fmtNotif(tpl,nm,ev,amt,dl){return tpl.replace('{name}',nm).replace('{event}',ev).replace('{amount}',amt).replace('{days}',dl<=0?'OVERDUE':dl)}

function fd(n){return '$'+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0})}
function fp(n){return Math.round(n*100)+'%'}
function gd(id,f){return(TD[id]||{})[f]||''}
function gdn(id,f){return parseFloat((TD[id]||{})[f])||0}
function upd(id,f,v){if(!TD[id])TD[id]={};TD[id][f]=v;if(f==='cs'&&v==='collected'){TD[id]['ct']=Date.now()}if(f==='cs'&&v!=='collected'){delete TD[id]['ct']}try{localStorage.setItem(SK,JSON.stringify(TD))}catch(e){}render()}
function dueDate(sd){var d=new Date(sd+'T12:00:00');var c=0;while(c<3){d.setDate(d.getDate()+1);if(d.getDay()===5)c++}return d}
function daysLeft(sd){return Math.ceil((dueDate(sd)-new Date())/(864e5))}
function weeksAgo(ed){return Math.round((new Date()-new Date(ed+'T12:00:00'))/(7*864e5))}
function doPif(id,bal){upd(id,'_prev',JSON.stringify({since:gd(id,'since'),cs:gd(id,'cs'),exp:gd(id,'exp'),ct:gd(id,'ct')}));if(!TD[id])TD[id]={};TD[id]['_pif']='1';TD[id]['since']=String(bal);TD[id]['cs']='collected';TD[id]['exp']='0';TD[id]['ct']=Date.now();try{localStorage.setItem(SK,JSON.stringify(TD))}catch(e){}render()}
function undoPif(id){var p;try{p=JSON.parse(gd(id,'_prev'))}catch(e){p={}}if(!TD[id])TD[id]={};TD[id]['since']=p.since||'0';TD[id]['cs']=p.cs||'not_contacted';TD[id]['exp']=p.exp||'0';TD[id]['_pif']='0';if(p.ct){TD[id]['ct']=p.ct}else{delete TD[id]['ct']}try{localStorage.setItem(SK,JSON.stringify(TD))}catch(e){}render()}
function doPifExp(id,a){upd(id,'_prevExp',gd(id,'exp'));upd(id,'exp',String(a))}
function undoPifExp(id){upd(id,'exp',gd(id,'_prevExp')||'0');upd(id,'_prevExp','')}

function togD(k,d){if(!NC[k])NC[k]={on:true,days:[]};var i=NC[k].days.indexOf(d);if(i>=0)NC[k].days.splice(i,1);else NC[k].days.push(d);saveN();render()}

var achPending=null;
function askACH(id,name,amount){
  achPending={id:id,name:name,amount:amount};
  render();
}
async function sendACH(id,name,amount,withAmount){
  var firstName=name.split(' ')[0];
  var byteChars=atob(ACH_B64);
  var byteArr=new Uint8Array(byteChars.length);
  for(var i=0;i<byteChars.length;i++)byteArr[i]=byteChars.charCodeAt(i);
  
  try{
    var PL=window.PDFLib||window['PDFLib']||window['pdf-lib'];
    if(!PL) throw new Error('no lib');
    var pdfDoc=await PL.PDFDocument.load(byteArr);
    var pages=pdfDoc.getPages();
    var pg=pages[0];
    var font=await pdfDoc.embedFont(PL.StandardFonts.Helvetica);
    var h=pg.getHeight();
    
    // Amount to be processed only
    if(withAmount)pg.drawText(amount,{x:290,y:h-455,size:12,font:font,color:PL.rgb(0,0,0)});
    
    var filledBytes=await pdfDoc.save();
    var blob=new Blob([filledBytes],{type:'application/pdf'});
    var file=new File([blob],'ACH_Form_'+name.replace(/\s+/g,'_')+'.pdf',{type:'application/pdf'});
    var msg='Hi '+firstName+',\n\nPlease fill out the attached ACH Collection Form and return it at your earliest convenience.\n\nAmount Due: '+amount+'\n\nThank you,\nTax Lien Code\n(888) 333-9403';
    
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({title:'ACH Collection Form - Tax Lien Code',text:msg,files:[file]});
    if(id){var now=new Date();var ts=now.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});var prev=gd(id,'cn');var note='ACH sent '+ts+(withAmount?' ('+amount+')':' (blank)');upd(id,'cn',prev?(prev+' | '+note):note)}
    } else {
      var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=file.name;a.click();
    }
  }catch(e){
    alert('PDF error: '+e.message);
    // Fallback: send unfilled
    var blob2=new Blob([byteArr],{type:'application/pdf'});
    var file2=new File([blob2],'ACH_Collection_Form_TLC.pdf',{type:'application/pdf'});
    var msg2='Hi '+firstName+',\n\nPlease fill out the attached ACH form. Amount Due: '+amount+'\n\nTax Lien Code (888) 333-9403';
    if(navigator.canShare&&navigator.canShare({files:[file2]})){
      await navigator.share({title:'ACH Form',text:msg2,files:[file2]});
    }
  }
}
function testNotif(){
  if(!('Notification' in window)){alert('Install to Home Screen first');return}
  if(Notification.permission!=='granted'){alert('Enable notifications first');return}
  var sample=D.filter(function(c){return c.bal>0});
  var pick=sample[Math.floor(Math.random()*sample.length)];
  if(!pick)pick={nm:'Anthony Lucero',ev:'Albuquerque',cl:'LH',bal:29997};
  var rem=pick.bal-gdn(pick.id,'since');
  var dl=daysLeft(pick.ed);
  try{
    var n=new Notification(fmtNotif(NTITLE,pick.nm,pick.ev,fd(rem),dl),{
      body:fmtNotif(NBODY,pick.nm,pick.ev,fd(rem),dl),
      tag:'test-'+Date.now()
    });
    n.onclick=function(){window.focus();if(pick.id)jumpTo(pick.id)};
  }catch(e){alert('Error: '+e.message)}
}

function svg(w,h,ws,si,ex,txt){
  var r=w*.4,lw=w*.13,cx=w/2,cy=h-2;
  function arc(s,e,col){var sa=Math.PI+s*Math.PI,ea=Math.PI+e*Math.PI,pts=[];for(var i=0;i<=30;i++){var a=sa+i*(ea-sa)/30;pts.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1))}return'<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+col+'" stroke-width="'+lw+'" stroke-linecap="round"/>'}
  var s='<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">';s+=arc(0,1,'#1e293b');
  if(ws>0)s+=arc(0,Math.min(ws,1),'#4ade80');if(si>0)s+=arc(ws,Math.min(ws+si,1),'#38bdf8');
  if(ex>0)s+=arc(ws+si,Math.min(ws+si+ex,1),'rgba(251,191,36,.3)');
  if(txt)s+='<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" fill="#e2e8f0" font-size="'+(w*.22)+'" font-weight="700" font-family="system-ui">'+txt+'</text>';
  return s+'</svg>'}

function render(){

  // Only show events within last 5 weeks
  var cutoff=new Date();cutoff.setDate(cutoff.getDate()-35);var cutStr=cutoff.toISOString().split('T')[0];
  var now=Date.now();var DAY=24*60*60*1000;
  var allOpen=D.filter(function(c){if(c.bal<=0||c.ed<cutStr)return false;var cs=gd(c.id,'cs');var ct=gdn(c.id,'ct');if(cs==='collected'&&ct>0&&(now-ct)>DAY)return false;return true});
  var evSet={};var evBal={};allOpen.forEach(function(c){evSet[c.ev]=true;if(!evBal[c.ev])evBal[c.ev]=0;evBal[c.ev]+=c.bal-gdn(c.id,'since')});var evList=Object.keys(evSet);
  var activeEvs=Object.keys(S.evs).filter(function(k){return S.evs[k]});var showAllEvs=activeEvs.length===0;
  var evFiltered=showAllEvs?allOpen:allOpen.filter(function(c){return S.evs[c.ev]});
  var items=f==='ALL'?evFiltered:evFiltered.filter(function(c){return c.cl===f});
  items.sort(function(a,b){var av=a[S.sb],bv=b[S.sb];if(typeof av==='string')return S.sd==='asc'?av.localeCompare(bv):bv.localeCompare(av);return S.sd==='asc'?av-bv:bv-av});
  var tS=0,tW=0,tB=0,tSi=0,tE=0;
  evFiltered.forEach(function(c){tS+=c.sale;tW+=c.col;tB+=c.bal;tSi+=gdn(c.id,'since');tE+=gdn(c.id,'exp')});
  var pp=tS>0?(tW+tSi)/tS:0;
  var cls={};evFiltered.forEach(function(c){if(!cls[c.cl])cls[c.cl]={bal:0,cnt:0,sale:0,ws:0,si:0,ex:0,con:0};cls[c.cl].bal+=c.bal;cls[c.cl].cnt++;cls[c.cl].sale+=c.sale;cls[c.cl].ws+=c.col;cls[c.cl].si+=gdn(c.id,'since');cls[c.cl].ex+=gdn(c.id,'exp');if(gd(c.id,'cs')&&gd(c.id,'cs')!=='not_contacted')cls[c.cl].con++});
  var clKeys=Object.keys(cls).sort(function(a,b){return cls[b].bal-cls[a].bal});
  var selCl=f!=='ALL'&&cls[f]?cls[f]:null;

  // ===== STICKY TOP =====
