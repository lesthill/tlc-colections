    h+='<div style="background:rgba(30,58,95,.1);border-radius:8px;padding:10px;margin-bottom:8px">';
    h+='<div class="fx ac g8">';
    if(spd>=.999){h+='<div style="width:50px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(74,222,128,.1);border-radius:6px"><span style="font-size:14px">&#9989;</span></div>'}
    else{h+='<div style="width:50px;height:30px;flex-shrink:0">'+svg(50,30,swp,ssp,sep,fp(spd))+'</div>'}
    h+='<div style="flex:1"><div style="font-size:14px;font-weight:700;color:#7dd3fc">'+f+' <span style="color:#64748b;font-weight:400;font-size:11px">'+CN[f]+'</span></div>';
    h+='<div style="font-size:11px;color:#475569">'+sc.cnt+' accts | '+sc.con+' contacted | <span style="color:#fb923c;font-weight:700">'+fd(sc.bal)+'</span></div></div></div></div>'
  }

  h+='</div>';// end .hdr

  // Closer pills (in sticky)
  h+='<div class="closer-bar"><div class="pills">';
  h+='<div class="pill all'+(f==='ALL'?' on':'')+'" onclick="S.f=\'ALL\';render()">ALL</div>';
  clKeys.forEach(function(k){h+='<div class="pill'+(f===k?' on':'')+'" onclick="S.f=S.f===\''+k+'\'?\'ALL\':\''+k+'\';render()">'+k+'</div>'});
  h+='</div></div>';
  h+='</div>';// end .sticky

  // ===== SCROLLABLE CONTENT =====

  // Settings
  if(S.settings){
    h+='<div class="frame" style="margin-top:8px">';
    h+='<div class="fx jb ac" style="margin-bottom:12px"><div style="font-size:14px;font-weight:700;color:#e2e8f0">&#128276; Notifications</div>';
    h+='<button style="background:transparent;border:1px solid rgba(30,58,95,.3);color:#475569;padding:6px 12px;font-size:11px;border-radius:6px" onclick="S.settings=false;render()">Close</button></div>';
    var perm='Notification' in window?Notification.permission:'none';
    if(perm==='default'||perm==='none'){h+='<button style="width:100%;background:#4ade80;border:none;color:#080d13;padding:14px;font-size:14px;font-weight:700;border-radius:8px;margin-bottom:12px" onclick="reqPerm()">Enable Notifications</button>'}
    else if(perm==='denied'){h+='<div style="padding:12px;background:rgba(248,113,113,.1);border-radius:6px;margin-bottom:12px;font-size:12px;color:#f87171">Blocked. Enable in Settings.</div>'}
    else{h+='<div style="padding:8px 12px;background:rgba(74,222,128,.1);border-radius:6px;margin-bottom:12px;font-size:12px;color:#4ade80">&#9989; Enabled</div>'}
    h+='<div style="font-size:10px;color:#64748b;letter-spacing:1px;margin-bottom:8px;font-weight:600">NOTIFY FOR</div>';
    ['ALL'].concat(Object.keys(CN)).forEach(function(k){
      var cfg=NC[k]||{on:false,days:[]};
      h+='<div class="fx jb ac" style="padding:10px 0;border-bottom:1px solid rgba(30,58,95,.1)">';
      h+='<span style="font-size:13px;font-weight:700;color:'+(k==='ALL'?'#4ade80':'#7dd3fc')+'">'+(k==='ALL'?'ALL CLOSERS':k+' - '+CN[k])+'</span>';
      h+='<button style="width:48px;height:26px;border-radius:13px;border:none;background:'+(cfg.on?'#4ade80':'#1e293b')+';position:relative" onclick="togN(\''+k+'\')">';
      h+='<div style="width:20px;height:20px;border-radius:10px;background:#fff;position:absolute;top:3px;'+(cfg.on?'right:3px':'left:3px')+'"></div></button></div>';
      if(cfg.on){h+='<div class="fx g4" style="padding:6px 0">';[1,3,5,7,14].forEach(function(d){var isOn=cfg.days&&cfg.days.indexOf(d)>=0;h+='<button style="padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid '+(isOn?'#7dd3fc':'rgba(30,58,95,.3)')+';background:'+(isOn?'rgba(125,211,252,.15)':'transparent')+';color:'+(isOn?'#7dd3fc':'#475569')+'" onclick="togD(\''+k+'\','+d+')">'+d+'d</button>'});h+='</div>'}
    });
    h+='</div>'
  }

  // Event pills
  h+='<div style="padding:8px 10px"><div class="pills">';
  h+='<div class="evpill'+(showAllEvs?' on':'')+'" onclick="togEv(\'ALL\')">ALL</div>';
  evList.forEach(function(ev){h+='<div class="evpill'+(S.evs[ev]?' on':'')+'" onclick="togEv(\''+ev+'\')">'+ev+'</div>'});
  h+='</div></div>';

  // Closer cards (only when ALL)
  if(f==='ALL'){
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:4px 10px 8px">';
    clKeys.forEach(function(k){
      var c2=cls[k],wp=c2.sale>0?c2.ws/c2.sale:0,sp=c2.sale>0?c2.si/c2.sale:0,ep=c2.sale>0?c2.ex/c2.sale:0,pd=c2.sale>0?(c2.ws+c2.si)/c2.sale:0;
      h+='<div class="closer-card" onclick="S.f=\''+k+'\';render()">';
      h+='<div class="fx ac g6">';
      if(pd>=.999){h+='<div style="width:44px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(74,222,128,.1);border-radius:5px"><span style="font-size:11px">&#9989;</span></div>'}
      else{h+='<div style="width:44px;height:26px;flex-shrink:0">'+svg(44,26,wp,sp,ep,'')+'</div>'}
      h+='<div style="flex:1;min-width:0"><div class="fx jb"><span style="color:#7dd3fc;font-weight:700;font-size:13px">'+k+'</span><span style="color:#fb923c;font-weight:700;font-size:11px">'+fd(c2.bal)+'</span></div>';
      h+='<div style="color:#475569;font-size:9px">'+c2.con+'/'+c2.cnt+' contacted</div></div></div></div>'
    });
    h+='</div>'
  }

  // Sort
  h+='<div class="fx g10" style="padding:4px 14px 8px">';
  [['bal','Balance'],['nm','Name'],['ev','Event'],['cl','Closer']].forEach(function(p){var on=S.sb===p[0];h+='<span class="sort'+(on?' on':'')+'" onclick="if(S.sb===\''+p[0]+'\')S.sd=S.sd===\'asc\'?\'desc\':\'asc\';else{S.sb=\''+p[0]+'\';S.sd=\'desc\'};render()">'+p[1]+(on?(S.sd==='asc'?' &#9650;':' &#9660;'):'')+'</span>'});
  h+='</div>';

  // Client cards
  if(!items.length){h+='<div style="padding:40px;text-align:center;color:#475569">No open accounts in window</div>'}
  items.forEach(function(c){
    var since=gdn(c.id,'since'),exp=gdn(c.id,'exp'),edt=gd(c.id,'edt'),cn=gd(c.id,'cn');
    var cs=gd(c.id,'cs')||'not_contacted';var isPif=gd(c.id,'_pif')==='1';
    var isX=S.exp===c.id;var isJ=S.jump===c.id;
    var dl=daysLeft(c.ed),dueD=dueDate(c.ed),dueFmt=(dueD.getMonth()+1)+'/'+dueD.getDate();
    var dlTxt=dl>0?dl+'d':dl===0?'TODAY':'PAST';var dlCol=dl<=0?'#f87171':dl<=7?'#fbbf24':'#4ade80';
    var urgBg=dl<=0?'rgba(248,113,113,.1)':dl<=7?'rgba(251,191,36,.1)':'rgba(74,222,128,.1)';
    var wp=c.sale>0?c.col/c.sale:0,sp=c.sale>0?since/c.sale:0,ep=c.sale>0?exp/c.sale:0;
    var totalPaid=c.col+since;var fullPaid=totalPaid>=c.sale&&c.sale>0;var remaining=c.bal-since;var pifAmt=Math.max(0,c.sale-c.col-since);
    var isExpPif=exp>=pifAmt&&pifAmt>0&&gd(c.id,'_prevExp');

    h+='<div class="card" id="c-'+c.id+'"'+(isJ?' style="box-shadow:inset 0 0 0 2px #7dd3fc"':'')+'>';
    if(isJ)setTimeout(function(){S.jump=null;render()},2500);
    h+='<div style="padding:12px" class="fx g10">';
    if(fullPaid){h+='<div class="done'+(isPif?' pif-anim':'')+'"><div style="text-align:center"><div style="font-size:24px">&#9989;</div><div style="font-size:10px;font-weight:700;color:#4ade80;letter-spacing:2px">PAID</div></div></div>'}
    else{h+='<div style="width:96px;height:56px;flex-shrink:0">'+svg(96,56,wp,sp,ep,fp(totalPaid/(c.sale||1)))+'</div>'}
    h+='<div style="flex:1;min-width:0"><div class="fx ac g4 fw" style="margin-bottom:4px">';
    h+='<span class="badge" style="color:'+dlCol+';background:'+urgBg+'">'+dlTxt+' ('+dueFmt+')</span>';
    h+='<span class="badge" style="color:'+(TC[c.t]||'#94a3b8')+';background:'+(TC[c.t]||'#94a3b8')+'15">'+(TS[c.t]||'')+'</span>';
    h+='<span style="color:#7dd3fc;font-size:11px;font-weight:700">'+c.cl+'</span></div>';
    h+='<div class="nm">'+c.nm+'</div><div class="ev">'+c.ev+'</div></div>';
    h+='<div style="text-align:right;flex-shrink:0"><div class="bal">'+fd(remaining>0?remaining:c.bal)+'</div>';
    h+='<div class="bsub">of '+fd(c.sale)+'</div>';
    if(since>0)h+='<div style="color:#38bdf8;font-size:10px;font-weight:600">+'+fd(since)+'</div>';
    h+='</div></div>';
    // Stats
    h+='<div style="padding:0 12px 6px" class="fx g8 fw" style="font-size:11px">';
    h+='<span class="grn" style="font-size:11px">WS:'+fd(c.col)+'</span>';
    if(c.rr)h+='<span class="'+(c.rr==='DECLINED'?'red':c.rr==='RANGE'?'blu':'ylw')+'" style="font-size:11px">RR:'+c.rn+'</span>';
    if(c.nt)h+='<span class="gry" style="font-size:11px">'+c.nt+'</span>';
    h+='</div>';
    // Contact
    if(c.ph||c.em){h+='<div style="padding:0 12px 6px" class="fx g6 fw con">';
      if(c.ph)h+='<a href="tel:'+c.ph+'">&#128222; '+c.ph+'</a>';
      if(c.em)h+='<a href="mailto:'+c.em+'" style="overflow:hidden;text-overflow:ellipsis;max-width:200px;white-space:nowrap">&#9993; '+c.em+'</a>';
    h+='</div>'}
    // Payment buttons (CC + ACH icons)
    if(remaining>0){h+='<div style="padding:0 12px 8px" class="fx g8">';
      h+='<a href="'+NMI+'" target="_blank" class="pay-btn pay-cc" title="Credit Card">&#128179;</a>';
      h+='<a href="'+ACH+'" target="_blank" class="pay-btn pay-ach" title="ACH Form">&#127974;</a>';
    h+='</div>'}
    // Status + expand
    h+='<div class="fx g8" style="padding:6px 12px 8px;border-top:1px solid rgba(30,58,95,.1)">';
    h+='<select class="sel" style="color:'+SC[cs]+'" onchange="upd(\''+c.id+'\',\'cs\',this.value)">';
    Object.keys(SN).forEach(function(k){h+='<option value="'+k+'"'+(cs===k?' selected':'')+'>'+SN[k]+'</option>'});
    h+='</select>';
    h+='<button class="btn" onclick="S.exp=S.exp===\''+c.id+'\'?null:\''+c.id+'\';render()">'+(isX?'&#9650;':'&#9660;')+'</button></div>';
    // Expanded
    if(isX){
      h+='<div style="padding:12px;background:#080d13;border-top:1px solid rgba(30,58,95,.15)">';
      h+='<div style="margin-bottom:12px"><label class="lbl blu">COLLECTED SINCE WORKSHOP</label>';
      h+='<div class="fx g8 ac"><input type="number" class="inp" style="color:#38bdf8;font-weight:700;font-size:16px;border-color:rgba(56,189,248,.2);max-width:160px" value="'+(since||'')+'" placeholder="0" onchange="upd(\''+c.id+'\',\'since\',this.value)">';
      if(isPif){h+='<button class="btn-undo" onclick="undoPif(\''+c.id+'\')">UNDO PIF</button>'}
      else{h+='<button class="btn-pif" onclick="doPif(\''+c.id+'\','+c.bal+')">PIF</button>'}
      h+='</div></div>';
      h+='<div style="margin-bottom:12px"><label class="lbl ylw">EXPECTED NEXT PAYMENT</label>';
      h+='<div class="fx g8 ac"><input type="number" class="inp" style="color:#fbbf24;font-weight:700;font-size:16px;border-color:rgba(251,191,36,.2);width:140px" value="'+(exp||'')+'" placeholder="0" onchange="upd(\''+c.id+'\',\'exp\',this.value)">';
      if(isExpPif){h+='<button class="btn-undo" onclick="undoPifExp(\''+c.id+'\')">UNDO</button>'}
      else if(pifAmt>0){h+='<button style="background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:#fbbf24;padding:12px 8px;font-size:11px;border-radius:6px;font-weight:700;white-space:nowrap" onclick="doPifExp(\''+c.id+'\','+pifAmt+')">PIF '+fd(pifAmt)+'</button>'}
      h+='</div><div style="margin-top:8px"><input type="date" class="inp" value="'+edt+'" onchange="upd(\''+c.id+'\',\'edt\',this.value)"></div></div>';
      h+='<div><label class="lbl gry">NOTES</label><input class="inp" value="'+(cn||'').replace(/"/g,'&quot;')+'" placeholder="Follow-up notes..." onchange="upd(\''+c.id+'\',\'cn\',this.value)"></div></div>'
    }
    if(!isX&&(cn||since>0||exp>0)){h+='<div style="padding:4px 12px 8px;font-size:11px" class="fx g8 fw">';
      if(since>0)h+='<span class="blu">+'+fd(since)+'</span>';if(exp>0)h+='<span class="ylw">Exp:'+fd(exp)+'</span>';
      if(edt)h+='<span class="gry">by '+edt+'</span>';if(cn)h+='<span class="gry">"'+cn+'"</span>';h+='</div>'}
    h+='</div>'
  });
  h+='<div class="fx jb ac" style="padding:14px 16px;font-size:8px;color:#1e293b"><span>LH // '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</span><span style="color:#7dd3fc;font-weight:700">TLC COLLECTIONS</span></div>';
  document.getElementById('app').innerHTML=h
}
try{var v=localStorage.getItem(SK);if(v)TD=JSON.parse(v)}catch(e){}
try{var nv=localStorage.getItem(NK);if(nv)NC=JSON.parse(nv)}catch(e){}
render();
</script>
</body>
</html>
